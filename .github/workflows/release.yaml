name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: canopy-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: canopy-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: canopy-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz canopy
          cd ../../..
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            ${{ matrix.name }}.tar.gz \
            ${{ matrix.name }}.tar.gz.sha256

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NUM="${VERSION#v}"

          # Download SHA256 files
          gh release download "$VERSION" --pattern '*.sha256'

          DARWIN_SHA=$(awk '{print $1}' canopy-darwin-arm64.tar.gz.sha256)
          LINUX_AMD64_SHA=$(awk '{print $1}' canopy-linux-amd64.tar.gz.sha256)
          LINUX_ARM64_SHA=$(awk '{print $1}' canopy-linux-arm64.tar.gz.sha256)

          BASE_URL="https://github.com/marcelocantos/canopy/releases/download/${VERSION}"

          cat > canopy.rb <<FORMULA
          class Canopy < Formula
            desc "MCP server for AST-level multi-language code transformations"
            homepage "https://github.com/marcelocantos/canopy"
            version "${VERSION_NUM}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/canopy-darwin-arm64.tar.gz"
                sha256 "${DARWIN_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${BASE_URL}/canopy-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              elsif Hardware::CPU.arm?
                url "${BASE_URL}/canopy-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
            end

            def install
              bin.install "canopy"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/canopy --version")
            end
          end
          FORMULA

      - name: Push formula to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # Clone the tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/marcelocantos/homebrew-tap.git" tap
          cp canopy.rb tap/Formula/canopy.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/canopy.rb
          git commit -m "canopy ${VERSION}" || exit 0
          git push
