  T3.2:
    name: auto_fix loop runs diagnostics, applies safe fixes, and terminates cleanly with cycle detection
    status: achieved
    value: 0.0
    cost: 0.0
    observable: true
    acceptance:
    - auto_fix MCP tool accepts a file (or path filter) and an optional iteration limit (default 10)
    - 'On each iteration: pull diagnostics, match each against the fix catalogue (regex → captures → fix action), apply entries with confidence=auto, return entries with confidence=suggest as recommendations'
    - 'Termination: clean (no diagnostics), stuck (no fixes applied this iteration), or iteration-limit reached'
    - 'Cycle detection: if a diagnostic message reappears verbatim after its fix was applied, flag the fix as broken (don''t loop forever) and report it in the output'
    - Each loop iteration's outcome (diagnostics seen, fixes applied, suggestions, cycle warnings) is included in the structured response so an orchestrator can drive multi-pass workflows
    context: The convergence loop. Builds on stored fix entries (🎯T3.1) and on the structured diagnostic shape (🎯T3.3) so matching is robust across LSPs. Cycle detection is the subtle correctness bit — without it the loop can oscillate.
    depends_on:
