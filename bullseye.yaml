    context: Observable checkpoint for 🎯T5. T25 proved transforms can fan out across N repos and produce per-repo diffs; this target proves the diffs can be turned into PRs the user can merge. Together they cover the substantive value of T5 (the daemon-multi-repo-management acceptance was already true). Builds on the existing transform_multi_root scaffolding and the per-repo error isolation pattern. The likely surface is a new MCP tool layered on top of transform_multi_root, plus a thin git+gh shell-out helper per repo (or use go-git + the GitHub REST API directly — pure-Go).
