    - Returned candidates have confidence=suggest by default; user can teach_fix them to make them permanent
    context: 'Lets the agent''s existing manual fix work bootstrap the catalogue. Each time the agent fixes a diagnostic, learn_from_observation can propose a permanent rule. Closes the loop: T24 produces structured diagnostics → T3.2 applies known fixes → T3.5 learns new ones from human/agent edits.'
