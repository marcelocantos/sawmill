    context: 'Observable checkpoint for 🎯T5. Generalised from a 2-repo demo to N-repo because once the >1 boundary is crossed, scaling to larger N is incidental and shouldn''t be artificially capped by the target. The work is: prove transform_multi_root works end-to-end across an arbitrary set of project roots with per-repo diff previews and graceful per-repo error isolation. transform_multi_root scaffolding already exists (🎯T5.1).'
