schema_version: 4
targets:
  T1:
    name: Intra-language pattern equivalences
    status: achieved
    value: 21.0
    cost: 21.0
    acceptance:
    - teach_equivalence tool stores bidirectional pattern pairs
    - apply_equivalence rewrites matches in either direction
    - check_equivalences flags non-preferred forms as violations
    - Transitive chains produce derived equivalences
    context: Originates from arr.ai work on cross-language transpilation as set relations. The intra-language case avoids type-bridge and grammar-extension problems. T16's pattern engine provides the foundation.
    depends_on:
    - T1.1
    - T1.2
    - T1.3
    - T1.4
    tags:
    - research
    - pattern-matching
    origin: manual
    discovered: 2026-04-07
    achieved: 2026-04-19
  T1.1:
    name: Equivalence pairs are stored — teach_equivalence MCP tool persists bidirectional pattern pairs in SQLite
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - teach_equivalence MCP tool accepts a name, two pattern strings (left/right), an optional description, and an optional preferred direction (left, right, or none)
    - Equivalences are persisted in a new SQLite table alongside recipes/conventions/invariants
    - list_equivalences MCP tool returns all stored pairs
    - delete_equivalence removes one by name
    - Pattern strings use the same $placeholder DSL as migrate_type/teach_by_example so existing pattern infrastructure is reused
    context: Foundation for 🎯T1. The storage layer must exist before apply/check tools can operate. Reuses sawmill's existing recipe/convention storage pattern in store/store.go and the $placeholder pattern syntax from 🎯T20 (migrate_type). Observable via the list_equivalences tool.
    depends_on:
    - T16
    tags:
    - pattern-matching
    - T1
    origin: manual
    discovered: 2026-04-19
    achieved: 2026-04-19
  T1.2:
    name: apply_equivalence rewrites code in either direction with diff preview and apply/undo support
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - apply_equivalence MCP tool accepts an equivalence name and a direction (left_to_right or right_to_left)
    - All matches across the codebase are rewritten in the chosen direction
    - Output is a unified diff per file, gated by the standard apply/undo flow
    - Path filter is supported, consistent with other transforms
    - 'Round-trip safety: applying left_to_right then right_to_left produces source byte-identical to the original (when the patterns are truly equivalent)'
    context: 'The execution side of 🎯T1: take a stored bidirectional pair and rewrite source. Builds on the existing transform/match engine and the rewrite/ ApplyEdits infrastructure. Round-trip safety is the canonical correctness check.'
    depends_on:
    - T1.1
    tags:
    - pattern-matching
    - T1
    origin: manual
    discovered: 2026-04-19
    achieved: 2026-04-19
  T1.3:
    name: check_equivalences flags non-preferred forms as convention violations
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - check_equivalences MCP tool scans the codebase for matches of any equivalence's non-preferred side
    - Each violation reports file, location (line/column), the matched pattern, and the suggested rewrite
    - Equivalences with no preferred direction are skipped
    - Path filter is supported
    context: The static-check side of 🎯T1, parallel to check_conventions and check_invariants. Lets a project enforce a preferred form (e.g. `errors.Is(err, X)` over `err == X`). Independent of T1.2 — uses the same matching logic but doesn't modify files.
    depends_on:
    - T1.1
    tags:
    - pattern-matching
    - T1
    origin: manual
    discovered: 2026-04-19
    achieved: 2026-04-19
  T1.4:
    name: Transitive chains produce derived equivalences — A↔B and B↔C imply A↔C
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Equivalence storage tracks pairs as a graph of patterns, computing the transitive closure on demand
    - apply_equivalence and check_equivalences honour derived equivalences (not only the directly-taught pairs)
    - 'Cycle detection: equivalences that close a loop are stored once, not repeated'
    - list_equivalences distinguishes taught vs derived
    context: The composability extension. Captures the algebraic property that motivates 🎯T1 in the first place — equivalence is transitive. Implementation is graph-walk over the equivalence pairs to compute closure. Closing cycles correctly is the subtle bit.
    depends_on:
    - T1.2
    - T1.3
    tags:
    - pattern-matching
    - T1
    origin: manual
    discovered: 2026-04-19
    achieved: 2026-04-19
  T10:
    name: ASTs are stored relationally in SQLite — normalised node tables with integer FK node types, field names, and blob-SHA dedup across commits
    status: achieved
    value: 13.0
    cost: 13.0
    acceptance:
    - A nodes table stores (id, file_blob_sha, parent_id, node_type_id, field_name_id, start_byte, end_byte) with integer FKs to lookup tables
    - node_types and field_names lookup tables normalise repeated strings to integer IDs
    - Byte offsets use delta encoding from parent where beneficial
    - File content is stored once per unique blob SHA — if the same file appears across 500 commits unchanged, one copy exists
    - A commit_files junction table maps (commit_sha, file_path) → blob_sha
    - 'SQL can answer structural queries: function parameters, method receivers, return types, parent-child relationships'
    - Indexing a commit parses only files whose blob SHA is not already indexed
    context: 'This is the core data model for 🎯T6. The design was discussed in detail: normalised node types/field names as integer FKs, blob-SHA dedup to avoid re-parsing unchanged files, relational AST storage so SQL can answer structural queries directly without Tree-sitter round-trips. This replaces the current flat symbol-only index with a full structural representation.'
    depends_on:
    - T9
    tags:
    - git
    - schema
    - sqlite
    - T6
    origin: decomposition of 🎯T6
    discovered: 2026-04-11
    achieved: 2026-04-12
  T11:
    name: Commits are lazily indexed — walking the commit graph and parsing files on demand, with progress tracking for bulk indexing
    status: achieved
    value: 8.0
    cost: 8.0
    acceptance:
    - HEAD, branch tips, and tags are indexed automatically when the daemon starts or a branch changes
    - Older commits are indexed lazily when a query touches them
    - Bulk indexing (index all commits) is available as an explicit MCP tool with progress reporting
    - First-parent walking is the default for linear history; merge commits fan out on demand
    - Already-indexed commits are skipped (commit SHA is the cache key)
    context: Controls when and how commits get indexed. The key insight is that most queries only need recent history, so lazy indexing avoids upfront cost. Bulk indexing is available for users who want the full history. Depends on git object access (🎯T6.1) and the relational AST schema (🎯T6.2).
    depends_on:
    - T9
    - T10
    tags:
    - git
    - indexing
    - daemon
    - T6
    origin: decomposition of 🎯T6
    discovered: 2026-04-11
    achieved: 2026-04-12
  T12:
    name: MCP tools expose structured git queries — git_log, git_diff_summary, git_blame_symbol return structured data instead of text
    status: achieved
    value: 13.0
    cost: 8.0
    acceptance:
    - git_log returns structured commit metadata (SHA, author, date, message, files changed, symbols changed) with filtering and pagination
    - git_diff_summary returns added/removed/modified symbols per file between any two refs, not raw hunks
    - git_blame_symbol returns the commit that last modified a given symbol's body, signature, or existence separately
    - All tools accept refs (branch names, tags, SHAs) and resolve them via the git object layer
    - Results are compact structured data suitable for agent consumption without context window waste
    context: The agent-facing surface of 🎯T6. These tools replace shelling out to git and parsing text output. They operate on the indexed data, so responses are fast. Depends on the indexing layer (🎯T6.3) being able to ensure queried commits are indexed.
    depends_on:
    - T11
    tags:
    - git
    - mcp
    - tools
    - T6
    origin: decomposition of 🎯T6
    discovered: 2026-04-11
    achieved: 2026-04-12
  T13:
    name: Semantic diffing compares ASTs structurally — detecting moves, renames, parameter changes, and generating API surface changelogs
    status: achieved
    value: 13.0
    cost: 13.0
    acceptance:
    - 'Structural diff between two commits produces edit operations: add, remove, modify, move, rename'
    - 'Move detection: a function deleted from file A and added to file B with similar AST structure is reported as a move'
    - 'Rename detection: a symbol with changed name but preserved structure is reported as a rename'
    - 'Signature change detection: parameter list or return type changes are reported specifically'
    - API surface changelog between two tags lists added/removed/changed public symbols with their signature changes
    - Data format diffs (YAML, JSON, TOML, XML) report key-level changes, not line-level
    context: The high-value capability that makes semantic git qualitatively different from text-based git. Uses the relational AST data to compare structure rather than text. GumTree-style algorithm (top-down isomorphic subtree matching, bottom-up container matching) is the likely approach. Data format diffs are trivially enabled since Tree-sitter already parses them. Depends on the relational AST schema (🎯T6.2) and query tools (🎯T6.4).
    depends_on:
    - T10
    - T12
    tags:
    - git
    - diffing
    - semantic
    - T6
    origin: decomposition of 🎯T6
    discovered: 2026-04-11
    achieved: 2026-04-13
  T14:
    name: Semantic bisect finds the commit where a structural predicate changed — without running the code
    status: achieved
    value: 8.0
    cost: 5.0
    acceptance:
    - git_semantic_bisect accepts a structural predicate (e.g. 'function X has parameter Y', 'type T implements interface I') and a commit range
    - Binary search over the commit range, indexing commits as needed, to find the first commit where the predicate flips
    - Returns the commit SHA, author, message, and the specific structural change that caused the predicate to flip
    context: A natural combination of lazy indexing and structural queries. Instead of 'does this commit build?' (requiring code execution), it answers 'at which commit did this structural property change?' (requiring only parsing). Depends on the indexing layer and structural query capability.
    depends_on:
    - T11
    - T13
    tags:
    - git
    - bisect
    - semantic
    - T6
    origin: decomposition of 🎯T6
    discovered: 2026-04-11
