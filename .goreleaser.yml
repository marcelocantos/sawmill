version: 2

project_name: sawmill

builds:
  - id: sawmill
    dir: go
    main: ./cmd/sawmill
    binary: sawmill
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: sawmill
    builds:
      - sawmill
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - agents-guide.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: marcelocantos
    name: sawmill
  draft: true
